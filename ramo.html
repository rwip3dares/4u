<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>4U - Propuesta</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden; /* evita scroll por los corazones */
      background: linear-gradient(to bottom, #ffe0ec, #fff0f5);
      font-family: "Comic Sans MS", cursive, sans-serif;
      margin: 0;
      position: relative;
    }

    /* corazones cayendo */
    .corazon-fondo {
      position: absolute;
      top: -10px;
      color: red;
      font-size: 20px;
      animation: caer 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes caer {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    .ramo {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      width: 300px;
      margin-bottom: 50px;
      position: relative;
      z-index: 2; /* sobre los corazones */
    }

    .flor {
      width: 60px;
      height: 60px;
      background: pink;
      border-radius: 50%;
      margin: 10px;
      position: relative;
      animation: girar 6s infinite linear;
    }

    .flor::before, .flor::after {
      content: "";
      width: 60px;
      height: 60px;
      background: pink;
      border-radius: 50%;
      position: absolute;
    }

    .flor::before {
      top: -30px;
      left: 0;
    }

    .flor::after {
      left: 30px;
      top: 0;
    }

    .centro {
      width: 25px;
      height: 25px;
      background: yellow;
      border-radius: 50%;
      position: absolute;
      top: 17px;
      left: 17px;
    }

    @keyframes girar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2em;
      color: #ff2d55;
      text-shadow: 2px 2px 4px #fff;
      animation: latir 1.5s infinite;
      z-index: 2;
    }

    @keyframes latir {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .corazon {
      color: red;
      font-size: 3em;
      margin-top: 10px;
      animation: latir 1.5s infinite;
      z-index: 2;
    }
  </style>
</head>
<body>
  <!-- contenedor de corazones -->
  <script>
    // genera corazones cayendo cada cierto tiempo
    function crearCorazon() {
      const corazon = document.createElement("div");
      corazon.classList.add("corazon-fondo");
      corazon.innerHTML = "❤️";
      corazon.style.left = Math.random() * 100 + "vw";
      corazon.style.fontSize = (Math.random() * 20 + 15) + "px";
      corazon.style.animationDuration = (Math.random() * 5 + 5) + "s";
      document.body.appendChild(corazon);

      setTimeout(() => {
        corazon.remove();
      }, 10000);
    }

    setInterval(crearCorazon, 300);
  </script>

  <div class="ramo">
    <div class="flor"><div class="centro"></div></div>
    <div class="flor"><div class="centro"></div></div>
    <div class="flor"><div class="centro"></div></div>
    <div class="flor"><div class="centro"></div></div>
    <div class="flor"><div class="centro"></div></div>
    <div class="flor"><div class="centro"></div></div>
  </div>

  <h1>¿Quieres ser mi polola? 💍✨</h1>
  <div class="corazon">❤️</div>
</body>
</html>
